<div class="preview-card glass p-6 rounded-[2rem] border border-[var(--border-subtle)] shadow-2xl animate-fade-in relative overflow-hidden">
  <div class="absolute top-0 right-0 p-4 opacity-10">
    <svg width="100" height="100" viewBox="0 0 24 24" fill="currentColor"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
  </div>
  
  <div class="badge badge--accent mb-4 text-[10px] tracking-[0.2em] font-black uppercase">Vista Previa Proyectada</div>
  
  <div class="image-placeholder w-full aspect-video rounded-3xl bg-[var(--bg-secondary)] mb-6 flex items-center justify-center border border-dashed border-[var(--border-bright)] overflow-hidden">
    <img *ngIf="imageUrl" [src]="imageUrl" class="w-full h-full object-cover" />
    <div *ngIf="!imageUrl" class="text-center text-muted">
       <svg class="w-12 h-12 mx-auto mb-2 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
       <p class="text-[10px] font-bold uppercase tracking-widest opacity-40">Digitalización de Activo</p>
    </div>
  </div>

  <h4 class="text-2xl font-black text-primary tracking-tighter mb-1">{{ name || 'Nombre del Producto' }}</h4>
  <p class="text-[10px] text-muted font-bold uppercase tracking-widest mb-4">{{ categoryName || 'Sin Categoría' }}</p>

  <div class="grid grid-cols-2 gap-4 mt-6 p-4 rounded-2xl bg-[var(--bg-primary)] border border-[var(--border-subtle)]">
    <div>
      <p class="text-[10px] font-black text-muted uppercase tracking-widest mb-1">PVP Sugerido</p>
      <p class="text-lg font-black text-primary tracking-tight">RD$ {{ price | number:'1.2-2' }}</p>
    </div>
    <div>
      <p class="text-[10px] font-black text-muted uppercase tracking-widest mb-1">Margen Est.</p>
      <p class="text-lg font-black" [class.text-green-500]="margin >= targetMargin" [class.text-amber-500]="margin < targetMargin">
        {{ margin | number:'1.0-0' }}%
      </p>
    </div>
  </div>

  <div class="mt-6 flex items-center gap-3">
    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
    <p class="text-[10px] font-bold text-muted uppercase tracking-[0.1em]">Configuración {{ step }}/3 Completada</p>
  </div>
</div>
