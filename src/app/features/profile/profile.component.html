<div class="page-header">
  <div>
    <h1>Mi Perfil</h1>
    <p>Gestiona tu información de cuenta</p>
  </div>
</div>

<div class="metric-grid mt-8">
  <!-- Info Card -->
  <div class="card flex flex-col items-center p-8">
    <div class="w-32 h-32 bg-accent-dim text-accent rounded-full flex items-center justify-center text-4xl font-bold mb-6 border-4 border-white shadow-lg">
      {{ avatar() }}
    </div>
    <h2 class="text-xl font-bold text-slate-900 mb-1">{{ user()?.username }}</h2>
    <span class="badge badge--accent mb-8">
      {{ user()?.role }}
    </span>
    
    <div class="w-full space-y-4">
      <div class="flex flex-col p-4 bg-bg-primary rounded-2xl border border-border">
        <span class="text-[10px] text-muted font-bold uppercase tracking-widest mb-1">Nombre Completo</span>
        <span class="text-sm font-semibold text-text-primary">{{ user()?.fullName || 'No definido' }}</span>
      </div>
      <div class="flex flex-col p-4 bg-bg-primary rounded-2xl border border-border">
        <span class="text-[10px] text-muted font-bold uppercase tracking-widest mb-1">Correo Electrónico</span>
        <span class="text-sm font-semibold text-text-primary">{{ user()?.email || 'No definido' }}</span>
      </div>
    </div>
  </div>

  <!-- Security Card -->
  <div class="card col-span-2 p-8" style="grid-column: span 2">
    <h3 class="text-lg font-bold text-text-primary mb-6 flex items-center gap-2">
      🛡️ Seguridad de la Cuenta
    </h3>

    <form (ngSubmit)="updatePassword()" #form="ngForm">
      <div class="space-y-6">
        <div class="form-group">
          <label>Nueva Contraseña</label>
          <input 
            type="password" 
            [(ngModel)]="newPassword" 
            name="newPassword" 
            required 
            minlength="6"
            placeholder="Mínimo 6 caracteres"
            class="form-control"
          />
        </div>
        <div class="form-group">
          <label>Confirmar Contraseña</label>
          <input 
            type="password" 
            [(ngModel)]="confirmPassword" 
            name="confirmPassword" 
            required
            placeholder="Repita la contraseña"
            class="form-control"
          />
        </div>

        <div *ngIf="message()" class="alert" [class.alert--success]="!isError()" [class.alert--error]="isError()">
          {{ message() }}
        </div>

        <button 
          type="submit" 
          [disabled]="form.invalid || loading() || newPassword !== confirmPassword"
          class="btn btn--primary w-full h-12"
        >
          {{ loading() ? 'Actualizando...' : 'Actualizar Contraseña' }}
        </button>
      </div>
    </form>
  </div>
</div>
