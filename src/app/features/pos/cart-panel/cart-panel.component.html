<div class="cart-container">
  <div class="cart-header">
    <h3>Detalle de Venta</h3>
    <button class="btn btn-icon btn-danger-text" (click)="clear.emit()" [disabled]="items.length === 0" title="Vaciar carrito (ESC)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
    </button>
  </div>

  <div class="cart-items custom-scrollbar">
    <div class="empty-cart" *ngIf="items.length === 0">
       <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.2; margin-bottom: 16px;"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
       <p>El carrito está vacío</p>
       <span class="tip">Selecciona productos del catálogo</span>
    </div>

    <div class="cart-item" *ngFor="let item of items">
       <div class="item-details">
          <div class="item-name">{{ item.product.name }}</div>
          <div class="item-price">{{ item.product.price | currency }}</div>
       </div>

       <div class="item-actions">
          <div class="qty-control">
             <button class="btn btn-icon qty-btn" (click)="updateQuantity.emit({item, quantity: item.quantity - 1})">-</button>
             <input type="number" class="qty-input" [value]="item.quantity" (change)="updateQuantity.emit({item, quantity: +$any($event.target).value})" min="0" [max]="item.product.stock" />
             <button class="btn btn-icon qty-btn" (click)="updateQuantity.emit({item, quantity: item.quantity + 1})" [disabled]="item.quantity >= item.product.stock">+</button>
          </div>
          <div class="item-total">{{ item.lineTotal | currency }}</div>
       </div>
    </div>
  </div>

  <div class="cart-summary">
    <div class="summary-row">
      <span>Subtotal</span>
      <span>{{ subtotal | currency }}</span>
    </div>
    <div class="summary-row">
      <span>ITBIS ({{ taxRate * 100 }}%)</span>
      <span>{{ taxAmount | currency }}</span>
    </div>
    <div class="summary-row summary-total">
      <span>Total</span>
      <span>{{ totalAmount | currency }}</span>
    </div>
  </div>
</div>
