<div class="login-root">
  <!-- Subtle Arctic Background -->
  <div class="arctic-bg">
    <div class="ambient-light-1"></div>
    <div class="ambient-light-2"></div>
  </div>

  <div class="login-container">
    <div class="brand-header animate-fade-in">
      <div class="brand-logo-container">
        <!-- Snowflake Icon (SVG) -->
        <svg viewBox="0 0 24 24" fill="none" class="brand-icon">
          <path d="M12 2v20M2 12h20M5 5l14 14M5 19L19 5M12 7l2 2m-4-2l-2 2m8 8l2 2m-12-8l-2 2m12 0l2 2m-4 8l-2-2m-8 0l2-2" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 class="brand-name-text">Arctic Enterprise</h1>
    </div>

    <div class="login-card animate-slide-up">
      <div class="login-intro">
        <h2>Welcome back</h2>
        <p class="text-muted">Please enter your details to access the suite.</p>
      </div>

      <div *ngIf="error" class="alert-box animate-fade-in">
        {{ error }}
      </div>

      <form (ngSubmit)="login()" #f="ngForm" class="login-form">
        <div class="form-group">
          <label>EMAIL ADDRESS</label>
          <input
            type="text"
            [(ngModel)]="username"
            name="username"
            placeholder="name@company.com"
            class="form-input"
            required
          />
        </div>

        <div class="form-group">
          <div class="label-row">
            <label>PASSWORD</label>
            <a href="javascript:void(0)" class="forgot-link">Forgot Password?</a>
          </div>
          <div class="input-relative">
            <input
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="password"
              name="password"
              placeholder="••••••••"
              class="form-input"
              required
            />
            <button type="button" class="eye-btn" (click)="showPassword = !showPassword">
              {{ showPassword ? 'Hide' : 'Show' }}
            </button>
          </div>
        </div>

        <div class="remember-row">
          <label class="checkbox-container">
            <input type="checkbox" name="remember">
            <span class="checkmark"></span>
            Remember me
          </label>
        </div>

        <button
          type="submit"
          class="submit-btn"
          [disabled]="loading"
        >
          {{ loading ? 'Signing in...' : 'Sign In' }}
        </button>

        <div class="signup-row">
          Don't have an account? <a href="javascript:void(0)" class="signup-link">Sign up</a>
        </div>
      </form>
    </div>

    <div class="security-badge animate-fade-in">
      <svg viewBox="0 0 24 24" fill="none" width="14" height="14" style="margin-right: 4px;">
        <path d="M12 15V17M8 11V7C8 4.79086 9.79086 3 12 3C14.2091 3 16 4.79086 16 7V11M5 11H19C20.1046 11 21 11.8954 21 13V19C21 20.1046 20.1046 21 19 21H5C3.89543 21 3 20.1046 3 19V13C3 11.8954 3.89543 11 5 11Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      ENTERPRISE GRADE SECURITY
    </div>
  </div>

  <div class="login-footer-strip">
    <div class="footer-left">© 2024 CLINICAL SYSTEMS INC. ALL RIGHTS RESERVED.</div>
    <div class="footer-right">
      <a href="javascript:void(0)">PRIVACY POLICY</a>
      <a href="javascript:void(0)">TERMS OF SERVICE</a>
      <a href="javascript:void(0)">SECURITY DISCLOSURE</a>
    </div>
  </div>
</div>
