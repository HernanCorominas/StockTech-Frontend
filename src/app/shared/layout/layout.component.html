<div class="app-layout">
  <!-- Top Navigation Bar (Modules) -->
  <header class="topnav">
    <div class="sidebar__brand" style="padding: 0; margin-right: 40px; border: none;">
      <div class="sidebar__logo" style="width: 32px; height: 32px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="sidebar__name" style="font-size: 1.1rem;">StockTech</div>
    </div>

    <nav class="topnav__modules">
      <a routerLink="/dashboard" routerLinkActive="active" class="topnav__link">Dashboard</a>
      <a routerLink="/pos" routerLinkActive="active" class="topnav__link" style="color: var(--primary); font-weight: 600;">POS</a>
      <a routerLink="/products" routerLinkActive="active" class="topnav__link">Inventario</a>
      <a routerLink="/invoices" routerLinkActive="active" class="topnav__link">Historial Ventas</a>
      <a routerLink="/clients" routerLinkActive="active" class="topnav__link">Clientes</a>
      
      <div class="topnav__dropdown" *ngIf="isAdminOrManager()">
        <span class="topnav__link">Administración ▾</span>
        <div class="topnav__dropdown-content">
          <a routerLink="/branches" routerLinkActive="active" *ngIf="canSeeBranches()">Sucursales</a>
          <a routerLink="/users" routerLinkActive="active" *ngIf="isAdminOrManager()">Usuarios</a>
          <a routerLink="/roles" routerLinkActive="active" *ngIf="isAdmin()">Roles</a>
          <div class="divider"></div>
          <a routerLink="/audit" routerLinkActive="active" *ngIf="isAdmin()">Auditoría de Actividad</a>
          <a routerLink="/reports" routerLinkActive="active">Reportes de Negocio</a>
          <div class="divider"></div>
          <a routerLink="/settings" routerLinkActive="active" *ngIf="isAdmin()">Ajustes Generales</a>
        </div>
      </div>
    </nav>

    <div style="flex: 1"></div>

    <div class="topnav__right">
      <div class="branch-selector--inline" *ngIf="branchState.authorizedBranches().length > 1">
        <select 
          [ngModel]="branchState.selectedBranchId()" 
          (ngModelChange)="branchState.selectBranch($event)">
          <option *ngFor="let b of branchState.authorizedBranches()" [ngValue]="b.branchId">{{ b.branchName }}</option>
        </select>
      </div>
      
      <app-notification-bell />

      <div class="user-pill" [routerLink]="['/profile']">
        <div class="user-pill__avatar">{{ userInitials() }}</div>
        <span class="user-pill__name">{{ username() }}</span>
      </div>

      <button class="logout-btn" (click)="logout()" title="Cerrar sesión">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      </button>
    </div>
  </header>

  <div class="layout-body">
    <!-- Contextual Sidebar (Actions) -->
    <aside class="side-actions" [class.collapsed]="isSidebarCollapsed">
      <div class="side-actions__header">
        <span>Acciones rápidas</span>
      </div>
      
      <div class="side-actions__content">
        <!-- Render dynamic Sidebar Template -->
        <ng-container *ngIf="sidebar.template()">
          <ng-container [ngTemplateOutlet]="sidebar.template()!"></ng-container>
        </ng-container>

        <!-- Render dynamic Sidebar Actions -->
        <div class="sidebar-action-list" *ngIf="sidebar.template() === null && sidebar.actions().length > 0; else comingSoon">
           <button *ngFor="let act of sidebar.actions()" 
                   [class]="'sidebar-action-btn ' + (act.class || '')"
                   [class.sidebar-action-btn--primary]="act.primary"
                   (click)="act.handler()">
              <span *ngIf="act.icon" class="sidebar-action-btn__icon" [innerHTML]="act.icon"></span>
              <span class="sidebar-action-btn__label">{{ act.label }}</span>
           </button>
        </div>

        <ng-template #comingSoon>
           <div class="coming-soon-badge" *ngIf="sidebar.template() === null && sidebar.actions().length === 0">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
              <span>Acciones dinámicas en desarrollo</span>
           </div>
        </ng-template>
      </div>

      <div class="side-actions__footer">
        <button class="collapse-btn" (click)="isSidebarCollapsed = !isSidebarCollapsed">
           {{ isSidebarCollapsed ? '→' : '← Colapsar' }}
        </button>
      </div>
    </aside>

    <!-- Main View Content -->
    <main class="main-content" #mainContent>
      <router-outlet />
    </main>
  </div>
</div>
